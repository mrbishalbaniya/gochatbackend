# Optional Render Blueprint — import in Render dashboard or use as reference.
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: gochatbackend
    runtime: go
    plan: free
    region: singapore
    buildCommand: go build -ldflags="-s -w" -o bin/server ./cmd/server
    startCommand: ./bin/server
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_NAME
        value: Pulse Chat Service
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: STUN_URLS
        value: stun:stun.l.google.com:19302
      - key: DATABASE_URL
        fromDatabase:
          name: gochat-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false

databases:
  - name: gochat-db
    plan: free
    databaseName: chat
    user: chat
